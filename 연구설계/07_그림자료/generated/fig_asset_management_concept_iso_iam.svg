<tspan x="1200" dy="0">Asset Management Decision-making</tspan>
</text>
<text x="1200" y="635" text-anchor="middle" font-size="31" font-weight="500" fill="#334155" font-family="Malgun Gothic, Apple SD Gothic Neo, Arial, sans-serif">
<tspan x="1200" dy="0">가치 · 위험 · 성능 · 비용의 균형</tspan>
</text>

