<text x="1200" y="858" text-anchor="middle" font-size="32" font-weight="700" fill="#7c4a03" font-family="Malgun Gothic, Apple SD Gothic Neo, Arial, sans-serif">
<tspan x="1200" dy="0">AIP: 제한된 예산에서 가치·위험·성과를 균형화</tspan>
