<text x="1200" y="302" text-anchor="middle" font-size="31" font-weight="700" fill="#23421e" font-family="Malgun Gothic, Apple SD Gothic Neo, Arial, sans-serif">
<tspan x="1200" dy="0">가치 실현  Value Realization</tspan>
</text>
