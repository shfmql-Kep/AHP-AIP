<rect x="190" y="1035" width="2020" height="130" rx="34" fill="#eef6ff" stroke="#9bbbd4" stroke-width="2"/>
<text x="1200" y="1092" text-anchor="middle" font-size="31" font-weight="700" fill="#1e3a5f" font-family="Malgun Gothic, Apple SD Gothic Neo, Arial, sans-serif">
<tspan x="1200" dy="0">본 연구 적용: 상태·PoF·CoF 데이터 → Risk·투자가치·PI 산정 → ILP·GA 기반 투자대상 선정</tspan>
</text>
<text x="1200" y="1140" text-anchor="middle" font-size="24" font-weight="400" fill="#64748b" font-family="Malgun Gothic, Apple SD Gothic Neo, Arial, sans-serif">
<tspan x="1200" dy="0">자료: ISO 55000:2024 및 IAM Asset Management - An Anatomy v4를 바탕으로 본 연구 재구성</tspan>
</text>
</svg>